<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felices 22</title>

<style>
/* =========================
   RESET Y BASE
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    font-family: 'Times New Roman', Times, serif;
}

/* =========================
   CAPA DE CONTENIDO
========================= */
.container{
    position:relative;
    z-index:10;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* TITULO */
h1{
    font-size:70px;
    color:white;
    text-shadow:3px 3px 12px rgba(0,0,0,0.5);
    margin-bottom:10px;
}

/* PASTEL */
.cake{
    font-size:80px;
    margin:10px 0;
    animation: float 2s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* IMAGEN */
.image-box{
    width:280px;
    height:280px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    margin:15px 0;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* MENSAJE */
p{
    color:white;
    font-size:15px;
    line-height:1.6;
    max-width:350px;
    text-shadow:2px 2px 5px rgba(0,0,0,0.4);
}

/* =========================
   ELEMENTOS FLOTANTES
========================= */
.float{
    position:absolute;
    font-size:24px;
    animation: rise linear infinite;
    opacity:0.8;
    z-index:1;
}

@keyframes rise{
    from{transform:translateY(100vh);}
    to{transform:translateY(-120vh);}
}

/* =========================
   CONFETI
========================= */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:-10px;
    animation: fall linear infinite;
    z-index:2;
}

@keyframes fall{
    to{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- CONTENIDO PRINCIPAL -->
<div class="container">

    <h1>🎉 FELICES 22 🎉 <br>
        HAPPY BIRTHDAY <br>
         </h1>

    <div class="cake">🎂</div>

    <div class="image-box">
        <img id="img" src="img1.jpg">
    </div>

    <p>
        Dios le regale más años con salud y bendiciones <br>
        cumpliendo cada sueño y meta que tenga en su corazón,<br>
        y siga cumpliendo el propósito que Dios creó en usted <br>
        la quiero <br>
    </p>

</div>

<script>

/* =========================
   CARRUSEL DE IMÁGENES
========================= */
let imgs = ["img1.jpg","img3.jpg","img4.jpg","img5.jpg","img7.jpeg","img8.jpeg","img9.jpeg","img10.jpeg","img11.jpeg","img12.jpeg","img13.jpeg","img14.jpeg","img15.jpeg","img17.jpeg","img18.jpeg","img19.jpeg","img20.jpeg","img21.jpeg","img22.jpeg"];
let i = 0;
let img = document.getElementById("img");

setInterval(()=>{
    i = (i+1) % imgs.length;
    img.src = imgs[i];
}, 2000);

/* =========================
   EMOJIS FLOTANTES
========================= */
let emojis = ["🎈","💖","🎉","🎊","🎁","✨","🎂"];

for(let i=0;i<50;i++){
    let el = document.createElement("div");
    el.classList.add("float");
    el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100 + "vw";
    el.style.animationDuration = (3+Math.random()*5) + "s";
    document.body.appendChild(el);
}

/* =========================
   CONFETI
========================= */
for(let i=0;i<120;i++){
    let c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random()*100 + "vw";
    c.style.background = ["red","blue","yellow","pink","purple","orange"][Math.floor(Math.random()*6)];
    c.style.animationDuration = (2+Math.random()*3) + "s";
    document.body.appendChild(c);
}

</script>

</body>
</html>
